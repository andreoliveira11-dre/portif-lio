<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <title>Dre Studio Criativo</title>
</head>
<body>

  <header>
    <div class="interface">
      <div class="logo">
        <a href="#">
          <img src="images/logo.png" alt="Logo Dre" />
        </a>
      </div>

      <nav class="menu-desktop">
        <ul>
          <li><a href="#topo">Início</a></li>
          <li><a href="#sobre">Sobre</a></li>
          <li><a href="#projetos">Projetos</a></li>
        </ul>
      </nav>

      <div class="btn-contato">
        <a href="https://wa.me/5586998187370" target="_blank">
          <button>Contato</button>
        </a>
      </div>
    </div>
  </header>

  <main>
    <section id="sobre" class="sobre">
      <div class="interface">
        <div class="flex sobre-conteudo">
          <div class="texto-sobre">
            <h1>TRANSFORMANDO IDEIAS EM REALIDADE DIGITAL</h1>
            <p>
              Criatividade e inovação andam lado a lado. Com uma combinação
              de design moderno e funcionalidade intuitiva, estou pronto
              para transformar suas ideias em uma presença digital impactante.
            </p>
          </div>

          <div class="img-sobre">
            <div class="losango">
              <img src="images/minhafoto.png" alt="Minha foto" />
            </div>
          </div>
        </div>
      </div>
    </section>

    <section id="projetos" class="projetos">
      <div class="interface">
        <h2>PROJETOS</h2>
        <div id="lista-projetos" class="projetos-galeria"></div>
      </div>
    </section>
  </main>

  <footer id="contato">
    <p>2026 - Dre Creative Studio</p>
  </footer>
<script src="script.js"></script>
</body>
</html>
